name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

      - name: Test
        run: go test ./...

  codegen-fresh:
    # The generated API surface (internal/api/gen/forge.gen.go) is committed and
    # used by every build; this job asserts it is reproducible from the vendored
    # spec so a stale or hand-edited commit fails CI. Regenerate with `make gen`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Regenerate
        run: make gen
      - name: Assert committed codegen is up to date
        run: git diff --exit-code internal/api/gen/ || (echo "::error::forge.gen.go is stale — run 'make gen' and commit"; exit 1)
